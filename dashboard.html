<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insurance Dashboard</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #121212;
        color: #fff;
    }

    header {
        background-color: #1f1f1f;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        margin: 0;
        font-size: 1.8rem;
        color: #e50914;
    }

    #searchBar {
        padding: 8px 12px;
        border-radius: 4px;
        border: none;
        width: 250px;
    }

    .menu {
        display: flex;
        flex-direction: column;
        margin: 20px;
    }

    .main-menu {
        font-size: 1.2rem;
        margin: 10px 0;
        cursor: pointer;
        background-color: #1f1f1f;
        padding: 10px;
        border-radius: 4px;
        transition: 0.2s;
    }

    .main-menu:hover {
        background-color: #2a2a2a;
    }

    .sub-menu, .subsub-menu {
        margin-left: 20px;
        cursor: pointer;
        display: none;
    }

    .menu-item {
        margin: 5px 0;
        padding: 8px;
        background-color: #222;
        border-radius: 4px;
        transition: 0.2s;
    }

    .menu-item:hover {
        background-color: #333;
    }

    .thumbnails {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin: 20px;
    }

    .thumbnail-card {
        width: 200px;
        cursor: pointer;
        background-color: #1f1f1f;
        border-radius: 6px;
        overflow: hidden;
        transition: transform 0.2s;
    }

    .thumbnail-card:hover {
        transform: scale(1.05);
    }

    .thumbnail-card img {
        width: 100%;
        height: 120px;
        object-fit: cover;
    }

    .thumbnail-card div {
        padding: 5px;
        text-align: center;
        font-size: 0.9rem;
    }
</style>
</head>
<body>

<header>
    <h1>Insurance Dashboard</h1>
    <input type="text" id="searchBar" placeholder="Search...">
</header>

<div class="menu" id="menuContainer"></div>

<div class="thumbnails" id="thumbnailsContainer"></div>

<script>
const SHEET_ID = "1EKvbj2hQZI9L6LNNCFUBaeDcwat0PgFy8nN5zQ4xH7o";
const SHEET_JSON_URL = `https://spreadsheets.google.com/feeds/list/${SHEET_ID}/od6/public/values?alt=json`;

let sheetData = [];

async function fetchSheetData() {
    try {
        const response = await fetch(SHEET_JSON_URL);
        const data = await response.json();
        sheetData = data.feed.entry.map(entry => ({
            main: entry.gsx$main.$t,
            sub: entry.gsx$sub.$t,
            subsub: entry.gsx$subsub.$t,
            action: entry.gsx$action.$t,
            video: entry.gsx$videourl.$t,
            thumbnail: entry.gsx$thumbnailurl.$t
        }));
        renderMenu();
        renderThumbnails(sheetData);
    } catch (error) {
        console.error("Error fetching Google Sheet:", error);
    }
}

function renderMenu() {
    const menuContainer = document.getElementById("menuContainer");
    menuContainer.innerHTML = "";

    const mains = [...new Set(sheetData.map(item => item.main))];

    mains.forEach(mainItem => {
        const mainDiv = document.createElement("div");
        mainDiv.className = "main-menu";
        mainDiv.textContent = mainItem;

        mainDiv.addEventListener("click", () => {
            const subs = sheetData.filter(item => item.main === mainItem && item.sub);
            mainDiv.querySelectorAll(".sub-menu").forEach(el => el.remove());
            subs.forEach(subItem => {
                const subDiv = document.createElement("div");
                subDiv.className = "sub-menu menu-item";
                subDiv.textContent = subItem.sub;

                subDiv.addEventListener("click", () => {
                    const subsubs = sheetData.filter(item => item.main === mainItem && item.sub === subItem.sub && item.subsub);
                    subDiv.querySelectorAll(".subsub-menu").forEach(el => el.remove());

                    subsubs.forEach(subsubItem => {
                        const subsubDiv = document.createElement("div");
                        subsubDiv.className = "subsub-menu menu-item";
                        subsubDiv.textContent = subsubItem.subsub;

                        subsubDiv.addEventListener("click", () => {
                            openVideo(subsubItem.video);
                        });

                        subDiv.appendChild(subsubDiv);
                    });

                    // If no subsub, open video directly
                    if (subsubs.length === 0) {
                        openVideo(subItem.video);
                    }

                });

                mainDiv.appendChild(subDiv);
            });

            // If no sub, open video directly
            const directItems = sheetData.filter(item => item.main === mainItem && !item.sub);
            if (directItems.length > 0) {
                directItems.forEach(item => openVideo(item.video));
            }

        });

        menuContainer.appendChild(mainDiv);
    });
}

function renderThumbnails(data) {
    const container = document.getElementById("thumbnailsContainer");
    container.innerHTML = "";

    data.forEach(item => {
        const card = document.createElement("div");
        card.className = "thumbnail-card";

        const img = document.createElement("img");
        img.src = item.thumbnail || "https://via.placeholder.com/200x120?text=No+Image";
        img.alt = item.main;

        const caption = document.createElement("div");
        caption.textContent = item.main;

        card.appendChild(img);
        card.appendChild(caption);

        card.addEventListener("click", () => openVideo(item.video));

        container.appendChild(card);
    });
}

function openVideo(url) {
    if (!url) {
        alert("No video URL provided.");
        return;
    }
    console.log("Video clicked:", url); // Simple analytics
    window.open(url, "_blank");
}

// Search bar functionality
document.getElementById("searchBar").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = sheetData.filter(item =>
        (item.main && item.main.toLowerCase().includes(term)) ||
        (item.sub && item.sub.toLowerCase().includes(term)) ||
        (item.subsub && item.subsub.toLowerCase().includes(term))
    );
    renderThumbnails(filtered);
});

// Fetch the sheet data on load
fetchSheetData();
</script>

</body>
</html>

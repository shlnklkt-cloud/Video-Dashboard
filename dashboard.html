<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insurance Dashboard</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; background-color: #141414; color: #fff; }
  header { background-color: #1f1f1f; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { margin: 0; font-size: 24px; }
  header input { padding: 8px 12px; font-size: 16px; border-radius: 4px; border: none; }
  .menu { display: flex; padding: 10px; background-color: #1f1f1f; overflow-x: auto; }
  .menu-item { margin-right: 20px; cursor: pointer; white-space: nowrap; }
  .menu-item:hover { text-decoration: underline; }
  .sub-menu { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; }
  .video-card { width: 220px; background-color: #1f1f1f; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
  .video-card:hover { transform: scale(1.05); }
  .video-card img { width: 100%; display: block; }
  .video-card h3 { padding: 10px; font-size: 16px; margin: 0; }
  .player { padding: 20px; }
  iframe { width: 100%; height: 480px; border: none; }
  .analytics { padding: 20px; font-size: 14px; color: #ccc; }
</style>
</head>
<body>

<header>
  <h1>Insurance Dashboard</h1>
  <input type="text" id="searchInput" placeholder="Search videos...">
</header>

<div class="menu" id="mainMenu"></div>

<div class="sub-menu" id="subMenu"></div>

<div class="player">
  <iframe id="videoPlayer" src="" allowfullscreen></iframe>
</div>

<div class="analytics" id="analyticsLog">
  Clicked Videos:
  <ul id="clickedVideos"></ul>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
  const sheetCSVUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqLVmIabusNFfPgAdG82nrVWjqJOzr-bkHqbFxTf5rc_Qw_fxPYIPpSIxbEYvseJ7o-aQJg5hTtO9M/pub?output=csv"; // <-- replace this with your CSV URL

  const mainMenu = document.getElementById('mainMenu');
  const subMenu = document.getElementById('subMenu');
  const videoPlayer = document.getElementById('videoPlayer');
  const clickedVideos = document.getElementById('clickedVideos');
  const searchInput = document.getElementById('searchInput');

  let sheetData = [];
  let currentMain = null;

  // Fetch CSV from Google Sheets
  Papa.parse(sheetCSVUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      sheetData = results.data;
      initDashboard();
    }
  });

  function initDashboard() {
    // Populate Main Menu
    const mainItems = [...new Set(sheetData.map(item => item.Main))];
    mainMenu.innerHTML = '';
    mainItems.forEach(main => {
      const div = document.createElement('div');
      div.className = 'menu-item';
      div.textContent = main;
      div.addEventListener('click', () => {
        currentMain = main;
        renderSubMenu();
      });
      mainMenu.appendChild(div);
    });
  }

  // Render Submenu & Thumbnails
  function renderSubMenu() {
    subMenu.innerHTML = '';
    let filtered = sheetData.filter(item => item.Main === currentMain);

    // Apply search filter
    const searchText = searchInput.value.toLowerCase();
    if (searchText) {
      filtered = filtered.filter(item =>
        (item.Sub && item.Sub.toLowerCase().includes(searchText)) ||
        (item.Subsub && item.Subsub.toLowerCase().includes(searchText))
      );
    }

    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'video-card';
      const img = document.createElement('img');
      img.src = item['Thumbnail URL'] || "https://via.placeholder.com/220x140?text=No+Image";
      img.alt = item.Sub || item.Subsub || item.Main;
      const title = document.createElement('h3');
      title.textContent = item.Sub || item.Subsub || item.Main;
      card.appendChild(img);
      card.appendChild(title);

      card.addEventListener('click', () => {
        if (item.Action === 'play') {
          videoPlayer.src = item['Video URL'];
          logClick(title.textContent);
        }
      });

      subMenu.appendChild(card);
    });
  }

  // Search functionality
  searchInput.addEventListener('input', renderSubMenu);

  // Analytics logging
  function logClick(videoTitle) {
    const li = document.createElement('li');
    li.textContent = videoTitle + ' - ' + new Date().toLocaleString();
    clickedVideos.appendChild(li);
  }
</script>
</body>
</html>

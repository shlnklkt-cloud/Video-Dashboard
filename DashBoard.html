<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#141414;
  color:white;
}

/* Sidebar */
.sidebar {
  width:220px;
  height:100vh;
  background:#000;
  position:fixed;
  padding:20px;
}

.menu-item {
  padding:10px;
  cursor:pointer;
}

.menu-item:hover {
  background:#333;
}

/* Content */
.content {
  margin-left:240px;
  padding:20px;
}

/* Search */
.search {
  padding:10px;
  width:300px;
  margin-bottom:20px;
  border-radius:5px;
  border:none;
}

/* Cards */
.card {
  width:220px;
  background:#222;
  margin:10px;
  display:inline-block;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-title {
  padding:10px;
}

.card:hover {
  transform:scale(1.05);
  background:red;
}

/* Analytics */
.analytics {
  position:fixed;
  bottom:10px;
  right:10px;
  background:#000;
  padding:10px;
  border-radius:8px;
  font-size:12px;
}
</style>

</head>

<body>

<div class="sidebar">
  <h3>🎬 Dashboard</h3>
  <div id="menu"></div>
</div>

<div class="content">

  <input class="search" placeholder="Search..." onkeyup="searchVideos(this.value)">

  <div id="cards"></div>

</div>

<div class="analytics" id="analytics"></div>

<script>

// 🔐 Check login
if(!localStorage.getItem("loggedIn")){
  window.location="index.html";
}

// 🔴 Google Sheet CSV
const sheetURL = "PASTE_YOUR_CSV_LINK_HERE";

let data = [];
let filtered = [];

// Fetch data
fetch(sheetURL)
.then(res => res.text())
.then(text => {
  const rows = text.split("\n").slice(1);

  rows.forEach(r => {
    const c = r.split(",");
    data.push({
      main:c[0],
      sub:c[1],
      subsub:c[2],
      url:c[4],
      thumb:c[5]
    });
  });

  filtered = data;
  loadMenu();
  showCards(filtered);
});

// Sidebar menu
function loadMenu(){
  const mains = [...new Set(data.map(d => d.main))];
  const menu = document.getElementById("menu");

  mains.forEach(m=>{
    const div = document.createElement("div");
    div.className="menu-item";
    div.innerText=m;

    div.onclick=()=>{
      filtered = data.filter(d=>d.main===m);
      showCards(filtered);
    };

    menu.appendChild(div);
  });
}

// Show cards
function showCards(list){
  const cards = document.getElementById("cards");
  cards.innerHTML="";

  list.forEach(v=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <img src="${v.thumb || 'https://via.placeholder.com/300'}">
      <div class="card-title">
        <b>${v.sub}</b><br>${v.subsub}
      </div>
    `;

    div.onclick=()=>{
      trackClick(v.sub);
      window.open(v.url,"_blank");
    };

    cards.appendChild(div);
  });

  updateAnalytics();
}

// Search
function searchVideos(text){
  text = text.toLowerCase();

  const result = data.filter(v =>
    v.main.toLowerCase().includes(text) ||
    v.sub.toLowerCase().includes(text) ||
    v.subsub.toLowerCase().includes(text)
  );

  showCards(result);
}

// Analytics
function trackClick(name){
  let stats = JSON.parse(localStorage.getItem("stats")||"{}");
  stats[name] = (stats[name]||0)+1;
  localStorage.setItem("stats", JSON.stringify(stats));
}

function updateAnalytics(){
  const stats = JSON.parse(localStorage.getItem("stats")||"{}");
  let html = "<b>Top Clicks</b><br>";

  Object.entries(stats)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .forEach(([k,v])=>{
      html += `${k}: ${v}<br>`;
    });

  document.getElementById("analytics").innerHTML = html;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#141414;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box {
  background:#222;
  padding:30px;
  border-radius:10px;
  width:300px;
  color:white;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

button {
  width:100%;
  padding:10px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Dashboard Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  if(user.value==="admin" && pass.value==="1234"){
    localStorage.setItem("loggedIn","true");
    window.location="dashboard.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
